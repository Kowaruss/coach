<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonuses BJ</title>

    <!-- Общие стили проекта -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- КНОПКА НАЗАД (как в poker) -->
    <div class="back-btn" onclick="history.back()">
        ← Назад
    </div>

    <div class="container">

        <!-- Заголовок -->
        <h1>Bonuses BJ</h1>

        <!-- Контент -->
        <div class="task">
            <p>
                Здесь будет задание по бонусам Blackjack
            </p>
        </div>

        <!-- Кнопка показать ответ -->
        <button class="button show-answer-btn" onclick="toggleAnswer()">
            Показать ответ
        </button>

        <!-- Ответ -->
        <div id="answer" class="answer hidden">
            Здесь будет правильный ответ
        </div>

    </div>

    <!-- Общий JS -->
    <script src="../script.js"></script>

    <!-- Если в корневом script.js нет toggleAnswer -->
    <script>
        function toggleAnswer() {
            const answer = document.getElementById("answer");
            answer.classList.toggle("hidden");
        }
    </script>

</body>
</html>
